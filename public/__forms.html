<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms Detection</title>
  </head>
  <body>
    <form name="confirmacao-doacao" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="confirmacao-doacao" />
      <input type="text" name="nome" />
      <input type="email" name="email" />
      <input type="text" name="whatsapp" />
      <input type="text" name="valor" />
      <input type="text" name="txid" />
      <input type="text" name="comprovante" />
      <input type="text" name="consentimento" />
    </form>
  </body>
</html>
