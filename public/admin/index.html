<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Missão África</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(135deg, #f3faf6, #f8fafc);
      }
      .loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: #fff;
        border: 1px solid #dbe5dd;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px -20px rgba(15, 23, 42, 0.35);
        max-width: 420px;
        width: 90%;
      }
      .title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
      }
      .text {
        margin-top: 8px;
        font-size: 14px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="loading">
      <div class="card">
        <p class="title">Carregando painel administrativo...</p>
        <p class="text">Aguarde enquanto o CMS inicializa.</p>
      </div>
    </div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.5.0/dist/decap-cms.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
